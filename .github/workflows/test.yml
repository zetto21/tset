name: Python Test

on:
  # 웹사이트의 Actions 탭에서 수동으로 버튼을 눌러 실행하도록 변경합니다.
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run main.py
      env:
        # GitHub Settings에 등록한 Secret을 환경변수로 주입합니다.
        # python-dotenv가 이 환경변수를 자동으로 인식합니다.
        DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      run: python main.py